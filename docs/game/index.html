<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #87ceeb; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    color: rgba(0,0,0,0.55);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  }

  #speed-bar-wrap {
    position: absolute; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #speed-bar-bg {
    width: 160px; height: 3px;
    background: rgba(0,0,0,0.15); border-radius: 2px;
  }
  #speed-bar-fill {
    height: 3px; width: 50%;
    background: rgba(0,0,0,0.5); border-radius: 2px; transition: width 0.1s;
  }
  #speed-label { font-size: 10px; letter-spacing: 0.2em; }

  #alt-wrap {
    position: absolute; right: 36px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  #alt-bar-bg {
    width: 3px; height: 120px;
    background: rgba(0,0,0,0.15); border-radius: 2px;
    display: flex; flex-direction: column-reverse;
  }
  #alt-bar-fill {
    width: 3px; height: 50%;
    background: rgba(0,0,0,0.5); border-radius: 2px; transition: height 0.1s;
  }
  #alt-label { font-size: 10px; letter-spacing: 0.2em; }

  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 18px; height: 18px;
  }
  #crosshair::before, #crosshair::after {
    content:''; position: absolute; background: rgba(0,0,0,0.35);
  }
  #crosshair::before { width:1px; height:100%; left:50%; transform:translateX(-50%); }
  #crosshair::after  { width:100%; height:1px; top:50%; transform:translateY(-50%); }

  #controls {
    position: absolute; bottom: 20px; right: 36px;
    text-align: right; line-height: 2; font-size: 10px; opacity: 0.5;
  }

  #biome-label {
    position: absolute; top: 22px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.25em; opacity: 0.45;
  }

  #crash-screen {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.75);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    color: rgba(0,0,0,0.75);
    font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
  }
  #crash-screen.show { display: flex; }
  #crash-screen h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.5em; }
  #restart-btn {
    margin-top: 10px; padding: 10px 32px;
    border: 1px solid rgba(0,0,0,0.3); background: transparent;
    color: rgba(0,0,0,0.65);
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s; pointer-events: all;
  }
  #restart-btn:hover { background: rgba(0,0,0,0.06); }

  /* ── Touch controls ─────────────────────────────────────────────────── */
  #touch-controls {
    display: none;
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #touch-controls.tc-active { display: block; }

  /* left half = joystick zone */
  #joystick-zone {
    position: absolute; left: 0; top: 0; bottom: 0; width: 55%;
    pointer-events: all;
  }

  #joystick-base {
    position: absolute;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.28);
    display: none;
    transform: translate(-50%, -50%);
  }
  #joystick-base.jb-visible { display: block; }

  #joystick-knob {
    position: absolute; top: 50%; left: 50%;
    width: 54px; height: 54px;
    border-radius: 50%;
    background: rgba(255,255,255,0.32);
    border: 1.5px solid rgba(255,255,255,0.5);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* right side = throttle buttons */
  #throttle-zone {
    position: absolute; right: 28px; bottom: 90px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    pointer-events: all;
  }
  .t-btn {
    width: 66px; height: 66px; border-radius: 50%;
    background: rgba(255,255,255,0.14);
    border: 1.5px solid rgba(255,255,255,0.32);
    color: rgba(255,255,255,0.75);
    font-size: 26px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: none;
    transition: background 0.1s;
  }
  .t-btn:active, .t-btn.pressed { background: rgba(255,255,255,0.30); }

  #touch-hint {
    position: absolute; bottom: 22px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.38); pointer-events: none;
    white-space: nowrap;
  }
</style>

<body>

  <div id="crosshair"></div>
  <div id="biome-label" id="biome-label"></div>

  <div id="speed-bar-wrap">

<script type="module">
import * as THREE from 'three';

// ─── Constants ────────────────────────────────────────────────────────────────
const TERRAIN_SEGS = 72;
const TERRAIN_SIZE = 700;
const CHUNK_AHEAD  = 3;
const SPEED_MIN    = 16;
const SPEED_MAX    = 85;
const SPEED_INIT   = 34;
const SEED         = Math.random() * 9999;

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ─── Scene / Sky ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog   = new THREE.Fog(0xc9e8f5, 120, 550);

// Sky gradient sphere
const skyGeo = new THREE.SphereGeometry(900, 16, 10);
const skyCols = [];
const skyP    = skyGeo.attributes.position;
const COL_SKY_TOP  = new THREE.Color(0x2563b8);
const COL_SKY_MID  = new THREE.Color(0x87ceeb);
const COL_SKY_HORI = new THREE.Color(0xd6eef8);
for (let i = 0; i < skyP.count; i++) {
  const t = THREE.MathUtils.clamp((skyP.getY(i) + 100) / 500, 0, 1);
  const c = t > 0.15
    ? COL_SKY_MID.clone().lerp(COL_SKY_TOP, (t - 0.15) / 0.85)
    : COL_SKY_HORI.clone().lerp(COL_SKY_MID, t / 0.15);
  skyCols.push(c.r, c.g, c.b);
}
skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyCols, 3));
scene.add(new THREE.Mesh(skyGeo,
  new THREE.MeshBasicMaterial({ side: THREE.BackSide, vertexColors: true })
));
scene.background = new THREE.Color(0x87ceeb);

// ─── Lighting ─────────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5e0, 2.8);
sun.position.set(200, 300, 100);
scene.add(sun);
scene.add(new THREE.AmbientLight(0xb0d0f0, 1.6));
// fill from below (sky bounce)
const fill = new THREE.HemisphereLight(0x87ceeb, 0x5a8a40, 0.8);
scene.add(fill);

// ─── Camera ───────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.2, 1100);

// ─── Noise ────────────────────────────────────────────────────────────────────
function hash(n) { const s = Math.sin(n) * 43758.5453; return s - Math.floor(s); }
function noise2(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x-ix, fz = z-iz;
  const ux = fx*fx*(3-2*fx), uz = fz*fz*(3-2*fz);
  const a = hash(ix   + iz*57), b = hash(ix+1 + iz*57);
  const c = hash(ix   + (iz+1)*57), d = hash(ix+1 + (iz+1)*57);
  return a+(b-a)*ux+(c-a)*uz+(b-a+a-b-c+d)*ux*uz;
}
function fbm(x, z, oct=6, seed=0) {
  let v=0, a=1, f=1, m=0;
  for(let i=0;i<oct;i++){ v+=noise2(x*f+seed,z*f+seed*1.7)*a; m+=a; a*=0.5; f*=2.1; }
  return v/m;
}

// ─── Biome / height-to-color ─────────────────────────────────────────────────
// Heights roughly: water<0, beach 0-3, grass 3-20, forest 20-38, rock 38-58, snow >58
const BIOMES = [
  { max: -10, col: new THREE.Color(0x1a5fa8) },  // deep water
  { max: -2,  col: new THREE.Color(0x2e86c1) },  // water
  { max:  1,  col: new THREE.Color(0xd4c07a) },  // wet sand
  { max:  4,  col: new THREE.Color(0xe8d28a) },  // beach
  { max: 14,  col: new THREE.Color(0x5aad3f) },  // grass
  { max: 26,  col: new THREE.Color(0x3d7a30) },  // meadow
  { max: 40,  col: new THREE.Color(0x7d6b5a) },  // rock
  { max: 56,  col: new THREE.Color(0x9e8e80) },  // high rock
  { max: Infinity, col: new THREE.Color(0xf0eeec) }, // snow
];

function heightColor(y) {
  for (const b of BIOMES) if (y < b.max) return b.col.clone();
  return BIOMES[BIOMES.length-1].col.clone();
}

// ─── Terrain height ────────────────────────────────────────────────────────
function getTerrainY(wx, wz) {
  const sc = 0.0035;
  const h  = fbm(wx*sc, wz*sc, 6, SEED);
  // bias: flatten low areas (water), exaggerate peaks
  const v = (h - 0.42) * 160;
  return v < 0 ? v * 0.4 : v;   // compress underwater, stretch land
}

// ─── Chunk system ─────────────────────────────────────────────────────────────
const terrainMat = new THREE.MeshLambertMaterial({ vertexColors: true });
const chunks = new Map();

function createChunk(cx, cz) {
  const key = `${cx},${cz}`;
  if (chunks.has(key)) return;

  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
  geo.rotateX(-Math.PI / 2);

  const pos  = geo.attributes.position;
  const cols = new Float32Array(pos.count * 3);

  for (let i = 0; i < pos.count; i++) {
    const wx = pos.getX(i) + cx * TERRAIN_SIZE;
    const wz = pos.getZ(i) + cz * TERRAIN_SIZE;
    const y  = getTerrainY(wx, wz);
    pos.setY(i, y);
    const c = heightColor(y);
    cols[i*3] = c.r; cols[i*3+1] = c.g; cols[i*3+2] = c.b;
  }
  pos.needsUpdate = true;
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 3));
  geo.computeVertexNormals();

  const mesh = new THREE.Mesh(geo, terrainMat);
  mesh.position.set(cx * TERRAIN_SIZE, 0, cz * TERRAIN_SIZE);
  scene.add(mesh);
  chunks.set(key, { mesh, cx, cz });
}

function updateChunks(px, pz) {
  const cx = Math.round(px / TERRAIN_SIZE);
  const cz = Math.round(pz / TERRAIN_SIZE);
  for (let dx=-1; dx<=CHUNK_AHEAD; dx++)
    for (let dz=-2; dz<=2; dz++)
      createChunk(cx+dx, cz+dz);
  for (const [key, ch] of chunks) {
    if (Math.abs(ch.cx-cx) > CHUNK_AHEAD+2 || Math.abs(ch.cz-cz) > 3) {
      scene.remove(ch.mesh); ch.mesh.geometry.dispose(); chunks.delete(key);
    }
  }
}

// ─── Airplane ─────────────────────────────────────────────────────────────────
function buildPlane() {
  const g    = new THREE.Group();
  const mW   = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const mRed = new THREE.MeshLambertMaterial({ color: 0xe53935 });
  const mDark= new THREE.MeshLambertMaterial({ color: 0xbbbbbb });

  // fuselage
  const fGeo = new THREE.CylinderGeometry(0.24, 0.10, 3.4, 7);
  fGeo.rotateZ(Math.PI/2);
  g.add(new THREE.Mesh(fGeo, mW));

  // nose
  const nGeo = new THREE.ConeGeometry(0.24, 0.9, 7);
  nGeo.rotateZ(-Math.PI/2);
  const nose = new THREE.Mesh(nGeo, mRed);
  nose.position.x = 2.15;
  g.add(nose);

  // cockpit bump
  const cGeo = new THREE.SphereGeometry(0.18, 6, 5, 0, Math.PI*2, 0, Math.PI*0.5);
  const cockpit = new THREE.Mesh(cGeo, new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.7 }));
  cockpit.position.set(0.5, 0.2, 0);
  g.add(cockpit);

  // wings
  const wGeo = new THREE.BoxGeometry(0.1, 0.04, 4.6);
  const wings = new THREE.Mesh(wGeo, mW);
  wings.position.x = -0.25;
  g.add(wings);

  // wing tips (red)
  [-1,1].forEach(s => {
    const tip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.06, 0.35), mRed);
    tip.position.set(-0.25, 0, s*2.45);
    g.add(tip);
  });

  // stabiliser
  const stab = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.03, 1.8), mDark);
  stab.position.x = -1.5;
  g.add(stab);

  // vertical tail
  const vt = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.6, 0.05), mRed);
  vt.position.set(-1.35, 0.35, 0);
  g.add(vt);

  return g;
}

const airplane = buildPlane();
scene.add(airplane);

// ─── State ────────────────────────────────────────────────────────────────────
function makeState() {
  return {
    pos:      new THREE.Vector3(0, 65, 0),
    quat:     new THREE.Quaternion(),
    speed:    SPEED_INIT,
    crashed:  false,
    distKm:   0,
    startTime: performance.now(),
  };
}
let state = makeState();

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code]=true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code]=false; });

// ─── Touch joystick ───────────────────────────────────────────────────────────
const touch = { pitchDir: 0, rollDir: 0, accel: false, decel: false };

(function initTouch() {
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (!isTouchDevice) return;

  const tcEl     = document.getElementById('touch-controls');
  const jZone    = document.getElementById('joystick-zone');
  const jBase    = document.getElementById('joystick-base');
  const jKnob    = document.getElementById('joystick-knob');
  const btnAccel = document.getElementById('btn-accel');
  const btnDecel = document.getElementById('btn-decel');

  tcEl.classList.add('tc-active');

  const DEAD  = 8;   // px dead-zone
  const MAX_R = 56;  // outer radius – max deflection → full rate
  let joyId = null, joyOriginX = 0, joyOriginY = 0;

  function updateKnob(dx, dy) {
    const dist  = Math.sqrt(dx*dx + dy*dy);
    const cDist = Math.min(dist, MAX_R);
    const angle = Math.atan2(dy, dx);
    const kx = Math.cos(angle) * cDist;
    const ky = Math.sin(angle) * cDist;
    jKnob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;

    const norm = dist < DEAD ? 0 : Math.min((dist - DEAD) / (MAX_R - DEAD), 1);
    // dy positive = finger DOWN = nose DOWN = pitchDir -1
    // dx positive = finger RIGHT = bank RIGHT = rollDir +1
    touch.pitchDir = dist < DEAD ? 0 : -(dy / dist) * norm;
    touch.rollDir  = dist < DEAD ? 0 :  (dx / dist) * norm;
  }

  jZone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    if (joyId !== null) return;
    joyId = t.identifier;
    joyOriginX = t.clientX;
    joyOriginY = t.clientY;
    jBase.style.left = t.clientX + 'px';
    jBase.style.top  = t.clientY + 'px';
    jBase.classList.add('jb-visible');
    updateKnob(0, 0);
  }, { passive: false });

  jZone.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== joyId) continue;
      updateKnob(t.clientX - joyOriginX, t.clientY - joyOriginY);
    }
  }, { passive: false });

  function joyEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier !== joyId) continue;
      joyId = null;
      touch.pitchDir = 0;
      touch.rollDir  = 0;
      jBase.classList.remove('jb-visible');
      jKnob.style.transform = 'translate(-50%, -50%)';
    }
  }
  jZone.addEventListener('touchend',    joyEnd, { passive: false });
  jZone.addEventListener('touchcancel', joyEnd, { passive: false });

  function holdBtn(el, flag) {
    el.addEventListener('touchstart',  e => { e.preventDefault(); touch[flag]=true;  el.classList.add('pressed'); },    { passive: false });
    el.addEventListener('touchend',    e => { e.preventDefault(); touch[flag]=false; el.classList.remove('pressed'); }, { passive: false });
    el.addEventListener('touchcancel', e => { touch[flag]=false;  el.classList.remove('pressed'); });
  }
  holdBtn(btnAccel, 'accel');
  holdBtn(btnDecel, 'decel');
})();

// ─── HUD ─────────────────────────────────────────────────────────────────────
const spdBar  = document.getElementById('speed-bar-fill');
const spdVal  = document.getElementById('spd-val');
const altBar  = document.getElementById('alt-bar-fill');
const altVal  = document.getElementById('alt-val');
const crashScr= document.getElementById('crash-screen');
const crashSco= document.getElementById('crash-score');

function updateHUD() {
  const sp = (state.speed-SPEED_MIN)/(SPEED_MAX-SPEED_MIN)*100;
  spdBar.style.width  = sp.toFixed(1)+'%';
  spdVal.textContent  = state.speed.toFixed(0);
  const ap = THREE.MathUtils.clamp(state.pos.y/220*100,0,100);
  altBar.style.height = ap.toFixed(1)+'%';
  altVal.textContent  = state.pos.y.toFixed(0);
}

// ─── Loop ─────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
// axes in airplane's LOCAL frame (plane faces +X, wings along Z, up along Y)
const LOCAL_PITCH_AXIS = new THREE.Vector3(0, 0, 1); // roll around Z = pitch (nose up/down)
const LOCAL_ROLL_AXIS  = new THREE.Vector3(1, 0, 0); // roll around X = bank
const _pitchQ = new THREE.Quaternion();
const _rollQ  = new THREE.Quaternion();
const _worldAxis = new THREE.Vector3();
const CAM_OFF = new THREE.Vector3(-14, 3.5, 0);

function tick() {
  if (state.crashed) return;
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);

  // ── throttle ──────────────────────────────────────────────────────────────
  const SPEED_RATE = 20;
  if (keys['KeyW'] || touch.accel) state.speed = Math.min(SPEED_MAX, state.speed + SPEED_RATE*dt);
  if (keys['KeyS'] || touch.decel) state.speed = Math.max(SPEED_MIN, state.speed - SPEED_RATE*dt);

  // ── attitude (quaternion-based, local axes) ───────────────────────────────
  const PITCH_RATE = 1.3;  // rad/s
  const ROLL_RATE  = 1.7;

  // ↑ = nose up  (rotate local +Z axis: positive pitch)
  // ↓ = nose down
  // ← = bank left (rotate local -X)
  // → = bank right
  let pitchDir = 0, rollDir = 0;
  if (keys['ArrowUp'])    pitchDir =  1;
  if (keys['ArrowDown'])  pitchDir = -1;
  if (keys['ArrowLeft'])  rollDir  = -1;
  if (keys['ArrowRight']) rollDir  =  1;
  // touch joystick – proportional (overrides keys when joystick active)
  if (touch.pitchDir !== 0) pitchDir = touch.pitchDir;
  if (touch.rollDir  !== 0) rollDir  = touch.rollDir;

  // world-space pitch axis = local Z rotated by current quat
  _worldAxis.copy(LOCAL_PITCH_AXIS).applyQuaternion(state.quat);
  _pitchQ.setFromAxisAngle(_worldAxis, pitchDir * PITCH_RATE * dt);
  state.quat.premultiply(_pitchQ);

  // world-space roll axis = local X rotated by current quat
  _worldAxis.copy(LOCAL_ROLL_AXIS).applyQuaternion(state.quat);
  _rollQ.setFromAxisAngle(_worldAxis, rollDir * ROLL_RATE * dt);
  state.quat.premultiply(_rollQ);

  // coordinated yaw from roll — extract roll angle and add yaw
  const rightVec  = new THREE.Vector3(0,0,1).applyQuaternion(state.quat);
  const bankAngle = Math.asin(THREE.MathUtils.clamp(rightVec.y, -1, 1));
  const yawRate   = -bankAngle * 0.55;
  const _yawQ     = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), yawRate*dt);
  state.quat.premultiply(_yawQ);

  // ── movement ──────────────────────────────────────────────────────────────
  const forward = new THREE.Vector3(1,0,0).applyQuaternion(state.quat);

  // simple gravity / lift
  const pitchUp  = forward.y;                      // +1 = pointing up
  const liftComp = state.speed * 0.014;
  const gravDrop = (9.8 - liftComp * 14) * 0.008;

  state.pos.addScaledVector(forward, state.speed * dt);
  state.pos.y -= gravDrop * state.speed * dt;

  // soft altitude limits
  if (state.pos.y > 280) state.pos.y = 280;

  state.distKm += state.speed * dt / 1000;

  // ── collision ─────────────────────────────────────────────────────────────
  const groundY = getTerrainY(state.pos.x, state.pos.z) + 1.8;
  if (state.pos.y < groundY) { doCrash(); return; }

  // ── airplane mesh ─────────────────────────────────────────────────────────
  airplane.position.copy(state.pos);
  airplane.quaternion.copy(state.quat);

  // ── camera ────────────────────────────────────────────────────────────────
  const camTarget = CAM_OFF.clone().applyQuaternion(state.quat).add(state.pos);
  camera.position.lerp(camTarget, 7*dt);
  camera.lookAt(state.pos.clone().addScaledVector(forward, 8));

  // ── sun follows (so lighting is always good) ──────────────────────────────
  sun.position.set(state.pos.x+200, state.pos.y+300, state.pos.z+100);

  updateChunks(state.pos.x, state.pos.z);
  updateHUD();
  renderer.render(scene, camera);
}

function doCrash() {
  state.crashed = true;
  const secs = ((performance.now()-state.startTime)/1000).toFixed(0);
  crashSco.textContent = `distance ${state.distKm.toFixed(2)} km  ·  time ${secs}s`;
  crashScr.classList.add('show');
}

window.restartGame = function() {
  for (const [,ch] of chunks) { scene.remove(ch.mesh); ch.mesh.geometry.dispose(); }
  chunks.clear();
  state = makeState();
  airplane.position.copy(state.pos);
  airplane.quaternion.copy(state.quat);
  crashScr.classList.remove('show');
  updateChunks(0,0);
  clock.getDelta();
  tick();
};

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

updateChunks(0,0);
tick();
</script>
</body>
</html>
