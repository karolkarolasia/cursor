<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    color: rgba(255,255,255,0.55);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  #speed-bar-wrap {
    position: absolute;
    bottom: 36px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #speed-bar-bg {
    width: 160px; height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
  }
  #speed-bar-fill {
    height: 3px; width: 50%;
    background: rgba(255,255,255,0.7);
    border-radius: 2px;
    transition: width 0.1s;
  }
  #speed-label { font-size: 10px; letter-spacing: 0.2em; }

  #alt-wrap {
    position: absolute;
    right: 36px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  #alt-bar-bg {
    width: 3px; height: 120px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    display: flex; flex-direction: column-reverse;
  }
  #alt-bar-fill {
    width: 3px; height: 50%;
    background: rgba(255,255,255,0.7);
    border-radius: 2px;
    transition: height 0.1s;
  }
  #alt-label { font-size: 10px; letter-spacing: 0.2em; }

  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.4);
  }
  #crosshair::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { width: 100%; height: 1px; top: 50%; transform: translateY(-50%); }

  #controls {
    position: absolute;
    bottom: 20px; right: 36px;
    text-align: right;
    line-height: 2;
    font-size: 10px;
    opacity: 0.4;
  }

  #crash-screen {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    color: rgba(255,255,255,0.8);
    font-size: 13px; letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  #crash-screen.show { display: flex; }
  #crash-screen h1 { font-size: 28px; font-weight: 300; letter-spacing: 0.5em; }
  #restart-btn {
    margin-top: 10px;
    padding: 10px 32px;
    border: 1px solid rgba(255,255,255,0.35);
    background: transparent;
    color: rgba(255,255,255,0.7);
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    pointer-events: all;
  }
  #restart-btn:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>

<div id="hud">
  <div id="crosshair"></div>

  <div id="speed-bar-wrap">
    <div id="speed-bar-bg"><div id="speed-bar-fill"></div></div>
    <div id="speed-label">spd <span id="spd-val">0</span></div>
  </div>

  <div id="alt-wrap">
    <div id="alt-bar-bg"><div id="alt-bar-fill"></div></div>
    <div id="alt-label">alt <span id="alt-val">0</span></div>
  </div>

  <div id="controls">
    ↑ ↓ &nbsp;pitch<br>
    ← → &nbsp;roll<br>
    W S &nbsp;throttle
  </div>
</div>

<div id="crash-screen">
  <h1>crash</h1>
  <div id="crash-score"></div>
  <button id="restart-btn" onclick="restartGame()">restart</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Constants ───────────────────────────────────────────────────────────────
const FOG_NEAR      = 80;
const FOG_FAR       = 420;
const TERRAIN_SEGS  = 64;
const TERRAIN_SIZE  = 600;
const CHUNK_AHEAD   = 3;
const SKY_TOP       = new THREE.Color(0x0a0a14);
const SKY_HORIZON   = new THREE.Color(0x1a1a2e);
const GROUND_COL    = new THREE.Color(0x0d1117);
const GRID_COL      = new THREE.Color(0x1e3a5f);
const PLANE_COL     = new THREE.Color(0xeaeaea);
const SPEED_MIN     = 18;
const SPEED_MAX     = 80;
const SPEED_INIT    = 32;

// ─── Scene setup ─────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.fog    = new THREE.Fog(0x0a0a14, FOG_NEAR, FOG_FAR);
scene.background = SKY_TOP;

// Gradient sky via simple large sphere
const skyGeo  = new THREE.SphereGeometry(800, 16, 8);
const skyMat  = new THREE.MeshBasicMaterial({ side: THREE.BackSide, vertexColors: true });
const skyColors = [];
const skyPos   = skyGeo.attributes.position;
for (let i = 0; i < skyPos.count; i++) {
  const y = skyPos.getY(i);
  const t = THREE.MathUtils.clamp((y + 200) / 400, 0, 1);
  const c = SKY_TOP.clone().lerp(SKY_HORIZON, 1 - t);
  skyColors.push(c.r, c.g, c.b);
}
skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(skyColors, 3));
scene.add(new THREE.Mesh(skyGeo, skyMat));

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);

// Dim directional light – creates subtle highlights on plane
const dirLight = new THREE.DirectionalLight(0x4466aa, 1.2);
dirLight.position.set(80, 120, -40);
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0x111122, 2.5));

// ─── Noise (simple value noise) ──────────────────────────────────────────────
function hash(n) {
  n = Math.sin(n) * 43758.5453123;
  return n - Math.floor(n);
}
function noise2(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x - ix,       fz = z - iz;
  const ux = fx * fx * (3 - 2 * fx);
  const uz = fz * fz * (3 - 2 * fz);
  const a = hash(ix     + iz     * 57);
  const b = hash(ix + 1 + iz     * 57);
  const c = hash(ix     + (iz+1) * 57);
  const d = hash(ix + 1 + (iz+1) * 57);
  return a + (b-a)*ux + (c-a)*uz + (b-a+a-b-c+d)*ux*uz;
}
function fbm(x, z, oct=5, seed=0) {
  let v=0, amp=1, freq=1, max=0;
  for (let i=0;i<oct;i++){
    v   += noise2(x*freq + seed, z*freq + seed*1.3) * amp;
    max += amp; amp *= 0.5; freq *= 2.1;
  }
  return v / max;
}

// ─── Terrain chunks ──────────────────────────────────────────────────────────
const terrainMat = new THREE.MeshLambertMaterial({
  color: GROUND_COL,
  wireframe: false,
});
const gridMat = new THREE.MeshBasicMaterial({
  color: GRID_COL,
  wireframe: true,
  transparent: true,
  opacity: 0.35,
});

const chunks   = new Map();   // key: "cx,cz"
const SEED     = Math.random() * 1000;

function getTerrainY(wx, wz) {
  const scale = 0.004;
  const h = fbm(wx * scale, wz * scale, 6, SEED);
  return (h - 0.5) * 120;
}

function createChunk(cx, cz) {
  const key = `${cx},${cz}`;
  if (chunks.has(key)) return;

  const geo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_SEGS, TERRAIN_SEGS);
  geo.rotateX(-Math.PI / 2);

  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const wx = pos.getX(i) + cx * TERRAIN_SIZE;
    const wz = pos.getZ(i) + cz * TERRAIN_SIZE;
    pos.setY(i, getTerrainY(wx, wz));
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();

  const solid = new THREE.Mesh(geo, terrainMat);
  const grid  = new THREE.Mesh(geo, gridMat);
  solid.position.set(cx * TERRAIN_SIZE, 0, cz * TERRAIN_SIZE);
  grid.position.copy(solid.position);

  scene.add(solid);
  scene.add(grid);
  chunks.set(key, { solid, grid, cx, cz });
}

function updateChunks(px, pz) {
  const cx = Math.round(px / TERRAIN_SIZE);
  const cz = Math.round(pz / TERRAIN_SIZE);
  for (let dx = -1; dx <= CHUNK_AHEAD; dx++) {
    for (let dz = -2; dz <= 2; dz++) {
      createChunk(cx + dx, cz + dz);
    }
  }
  // remove distant chunks
  for (const [key, chunk] of chunks) {
    if (Math.abs(chunk.cx - cx) > CHUNK_AHEAD + 2 || Math.abs(chunk.cz - cz) > 3) {
      scene.remove(chunk.solid);
      scene.remove(chunk.grid);
      chunk.solid.geometry.dispose();
      chunks.delete(key);
    }
  }
}

// ─── Airplane geometry (minimalist) ──────────────────────────────────────────
function buildPlane() {
  const g = new THREE.Group();

  const mat   = new THREE.MeshLambertMaterial({ color: PLANE_COL });
  const matDim = new THREE.MeshLambertMaterial({ color: 0x888888 });

  // fuselage – tapered box
  const fuseGeo = new THREE.CylinderGeometry(0.22, 0.09, 3.2, 6);
  fuseGeo.rotateZ(Math.PI / 2);
  g.add(new THREE.Mesh(fuseGeo, mat));

  // nose cone
  const noseGeo = new THREE.ConeGeometry(0.22, 0.8, 6);
  noseGeo.rotateZ(-Math.PI / 2);
  const nose = new THREE.Mesh(noseGeo, mat);
  nose.position.x = 2.0;
  g.add(nose);

  // main wings
  const wingGeo = new THREE.BoxGeometry(0.08, 0.04, 4.2);
  const wings = new THREE.Mesh(wingGeo, mat);
  wings.position.x = -0.3;
  g.add(wings);

  // wing sweep detail (leading edge line)
  const wSweepL = new THREE.BoxGeometry(0.9, 0.03, 0.03);
  [-1, 1].forEach(side => {
    const ws = new THREE.Mesh(wSweepL, matDim);
    ws.position.set(-0.05, 0, side * 1.5);
    ws.rotation.y = side * 0.3;
    g.add(ws);
  });

  // horizontal stabiliser
  const stabGeo = new THREE.BoxGeometry(0.06, 0.03, 1.6);
  const stab = new THREE.Mesh(stabGeo, matDim);
  stab.position.x = -1.45;
  g.add(stab);

  // vertical tail
  const vtGeo = new THREE.BoxGeometry(0.8, 0.55, 0.04);
  const vt = new THREE.Mesh(vtGeo, mat);
  vt.position.set(-1.3, 0.3, 0);
  g.add(vt);

  return g;
}

const airplane = buildPlane();
scene.add(airplane);

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  pos:      new THREE.Vector3(0, 60, 0),
  vel:      new THREE.Vector3(SPEED_INIT, 0, 0),
  pitch:    0,   // rad/s target
  roll:     0,
  yaw:      0,
  speed:    SPEED_INIT,
  heading:  new THREE.Euler(0, 0, 0, 'YXZ'),
  quat:     new THREE.Quaternion(),
  crashed:  false,
  distKm:   0,
  startTime: performance.now(),
};

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─── HUD elements ─────────────────────────────────────────────────────────────
const spdBar   = document.getElementById('speed-bar-fill');
const spdVal   = document.getElementById('spd-val');
const altBar   = document.getElementById('alt-bar-fill');
const altVal   = document.getElementById('alt-val');
const crashScr = document.getElementById('crash-screen');
const crashSco = document.getElementById('crash-score');

function updateHUD() {
  const spdPct = (state.speed - SPEED_MIN) / (SPEED_MAX - SPEED_MIN) * 100;
  spdBar.style.width = spdPct.toFixed(1) + '%';
  spdVal.textContent = state.speed.toFixed(0);

  const altPct = THREE.MathUtils.clamp(state.pos.y / 200 * 100, 0, 100);
  altBar.style.height = altPct.toFixed(1) + '%';
  altVal.textContent  = state.pos.y.toFixed(0);
}

// ─── Main loop ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
// camera follow offset (local to plane)
const CAM_OFFSET = new THREE.Vector3(-12, 3, 0);

function tick() {
  if (state.crashed) return;
  requestAnimationFrame(tick);

  const dt = Math.min(clock.getDelta(), 0.05);

  // ── Controls ────────────────────────────────────────────────────────────
  const PITCH_RATE  =  1.4;   // rad/s
  const ROLL_RATE   =  1.8;
  const SPEED_RATE  = 18;     // units/s²

  let pitchInput = 0, rollInput = 0;
  if (keys['ArrowUp'])   pitchInput = -1;
  if (keys['ArrowDown']) pitchInput =  1;
  if (keys['ArrowLeft']) rollInput  = -1;
  if (keys['ArrowRight'])rollInput  =  1;
  if (keys['KeyW']) state.speed = Math.min(SPEED_MAX, state.speed + SPEED_RATE * dt);
  if (keys['KeyS']) state.speed = Math.max(SPEED_MIN, state.speed - SPEED_RATE * dt);

  // Smooth attitude
  const PITCH_DAMP = 2.5, ROLL_DAMP = 2.5;
  state.pitch += (pitchInput * PITCH_RATE - state.pitch) * PITCH_DAMP * dt;
  state.roll  += (rollInput  * ROLL_RATE  - state.roll ) * ROLL_DAMP  * dt;
  // yaw from roll (coordinated turn)
  state.yaw   = -state.roll * 0.28;

  // Euler heading (YXZ: yaw, pitch, roll)
  state.heading.x += state.pitch * dt;
  state.heading.y += state.yaw   * dt;
  state.heading.z  = state.roll  * 0.65;

  // clamp pitch to avoid inversion
  state.heading.x = THREE.MathUtils.clamp(state.heading.x, -Math.PI * 0.38, Math.PI * 0.38);

  state.quat.setFromEuler(state.heading);

  // Forward direction
  const forward = new THREE.Vector3(1, 0, 0).applyQuaternion(state.quat);

  // Gravity component (pull toward earth when not pointing up)
  const gravity = 9.8;
  const lift    = state.speed * 0.38;  // crude lift model
  const gravNet = (gravity - lift * Math.abs(Math.cos(state.heading.x))) * 0.012;

  const velocity = forward.clone().multiplyScalar(state.speed);
  velocity.y -= gravNet * state.speed * dt * 0.4;

  state.pos.addScaledVector(velocity, dt);
  state.distKm += state.speed * dt / 1000;

  // ── Terrain collision ──────────────────────────────────────────────────
  const groundY = getTerrainY(state.pos.x, state.pos.z) + 1.5;
  if (state.pos.y < groundY) {
    doCrash();
    return;
  }
  // ceiling
  if (state.pos.y > 320) state.pos.y = 320;

  // ── Update airplane mesh ───────────────────────────────────────────────
  airplane.position.copy(state.pos);
  airplane.quaternion.copy(state.quat);

  // ── Camera ────────────────────────────────────────────────────────────
  const camTarget = CAM_OFFSET.clone().applyQuaternion(state.quat).add(state.pos);
  camera.position.lerp(camTarget, 8 * dt);
  camera.lookAt(state.pos.clone().addScaledVector(forward, 6));

  // ── Chunks ────────────────────────────────────────────────────────────
  updateChunks(state.pos.x, state.pos.z);

  updateHUD();
  renderer.render(scene, camera);
}

function doCrash() {
  state.crashed = true;
  const secs = ((performance.now() - state.startTime) / 1000).toFixed(0);
  crashSco.textContent = `distance ${(state.distKm).toFixed(2)} km  ·  time ${secs}s`;
  crashScr.classList.add('show');
}

window.restartGame = function() {
  // clean chunks
  for (const [, chunk] of chunks) {
    scene.remove(chunk.solid);
    scene.remove(chunk.grid);
    chunk.solid.geometry.dispose();
  }
  chunks.clear();

  state.pos.set(0, 60, 0);
  state.speed   = SPEED_INIT;
  state.heading.set(0, 0, 0);
  state.quat.setFromEuler(state.heading);
  state.pitch   = 0;
  state.roll    = 0;
  state.yaw     = 0;
  state.distKm  = 0;
  state.startTime = performance.now();
  state.crashed = false;
  crashScr.classList.remove('show');

  updateChunks(0, 0);
  clock.getDelta(); // reset delta
  tick();
};

// ── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Boot ────────────────────────────────────────────────────────────────────
updateChunks(0, 0);
tick();
</script>
</body>
</html>
